spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ineedit
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

ineedit:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production-at-least-256-bits}
    expiration-ms: 86400000   # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://ineedit.fun}
