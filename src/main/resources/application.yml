spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

ineedit:
  jwt:
    secret: ${JWT_SECRET:JWT_SECRET}
    expiration-ms: 86400000
  share:
    base-url: ${INEEDIT_SHARE_BASE_URL:INEEDIT_SHARE_BASE_URL}
  cors:
    allowed-origins: ${CORS_ORIGINS:CORS_ORIGINS}